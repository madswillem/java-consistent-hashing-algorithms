common:
    gc: true
    output-folder: /tmp
    iterations:
        warmup: 3
        execution: 7
    time:
        unit: NANOSECONDS
        mode: AverageTime
        warmup: 3
        execution: 7
    init-nodes: [1_024]
    hash-functions:
        - xx
    key-distributions:
        - uniform

algorithms:
    - name: dx
      args:
          capacity: 1
    - name: mads
      args:
          capacity: 1
    - name: memento
    - name: anchor
      args:
          capacity: 1

benchmarks:
    - name: incremental-resize-time
      common:
        init-nodes: [1_024]
      args:
        removal-rates: [0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
